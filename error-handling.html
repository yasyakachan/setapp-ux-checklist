<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1d23;
    color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
  }
  .icon { font-size: 22px; }
  .progress {
    font-size: 14px;
    color: #888;
    font-weight: 600;
  }
  .progress span { color: #e6e6e6; }
  .progress-bar-wrap {
    background: #2e3138;
    border-radius: 999px;
    height: 6px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar {
    height: 6px;
    background: #4caf82;
    border-radius: 999px;
    transition: width 0.3s ease;
    width: 0%;
  }
  .item {
    background: #22252d;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid #2e3138;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .item:hover { border-color: #444; }
  .item.checked { border-color: #4caf82; background: #1e2a24; }
  .item-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 2px solid #555;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }
  .item.checked .checkbox {
    background: #4caf82;
    border-color: #4caf82;
  }
  .checkmark {
    display: none;
    color: white;
    font-size: 12px;
    font-weight: 700;
  }
  .item.checked .checkmark { display: block; }
  .item-content { flex: 1; }
  .item-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 10px;
  }
  .badge.critical { background: #5c1e1e; color: #ff6b6b; }
  .badge.important { background: #3d3000; color: #f0a500; }
  .examples {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .example {
    font-size: 12px;
    font-family: monospace;
    padding: 6px 10px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .example.good { background: #1e3a2a; color: #7dd4a8; }
  .example.bad { background: #3a1e1e; color: #e07070; }
</style>
</head>
<body>

<div class="header">
  <div class="title">
    <span class="icon">🛟</span>
    Error Handling & Recovery
  </div>
  <div class="progress"><span id="done">0</span> / <span id="total">7</span></div>
</div>
<div class="progress-bar-wrap">
  <div class="progress-bar" id="bar"></div>
</div>

<div id="checklist"></div>

<script>
const items = [
  {
    text: "Every error has a clear recovery path — a button or instruction telling user what to do next",
    badge: "critical",
    examples: [
      { type: "good", text: "Couldn't save. [Try Again] or [Save Locally]" },
      { type: "bad", text: "Save failed. (no action)" }
    ]
  },
  {
    text: 'Network errors distinguish between "no connection" and "server error"',
    badge: "important",
    examples: [
      { type: "good", text: "You're offline. Changes will sync when you reconnect." },
      { type: "bad", text: "Connection error" }
    ]
  },
  {
    text: "App never silently fails — if something went wrong the user always knows",
    badge: "critical"
  },
  {
    text: "If a long operation fails midway, user's data and progress are preserved",
    badge: "critical"
  },
  {
    text: "Crash or force-quit recovery — app restores to last known state on relaunch",
    badge: "important"
  },
  {
    text: "Validation errors shown inline next to the field, not in a generic alert at the top",
    badge: "important",
    examples: [
      { type: "good", text: 'Red border + "Must be at least 8 characters" under the field' },
      { type: "bad", text: 'Alert: "Invalid input"' }
    ]
  },
  {
    text: "Permission denied errors explain exactly how to fix it",
    badge: "critical",
    examples: [
      { type: "good", text: "Open System Settings → Privacy & Security → Files → enable [App]" },
      { type: "bad", text: "Permission denied" }
    ]
  }
];

const list = document.getElementById("checklist");
const bar = document.getElementById("bar");
const doneEl = document.getElementById("done");
const totalEl = document.getElementById("total");
totalEl.textContent = items.length;

const state = new Array(items.length).fill(false);

function updateProgress() {
  const done = state.filter(Boolean).length;
  doneEl.textContent = done;
  bar.style.width = (done / items.length * 100) + "%";
}

items.forEach((item, i) => {
  const div = document.createElement("div");
  div.className = "item";
  div.innerHTML = `
    <div class="item-top">
      <div class="checkbox"><span class="checkmark">✓</span></div>
      <div class="item-content">
        <div class="badge ${item.badge}">${item.badge.toUpperCase()}</div>
        <div class="item-text">${item.text}</div>
        ${item.examples ? `<div class="examples">${item.examples.map(e => `<div class="example ${e.type}">${e.type === 'good' ? '✅' : '❌'} ${e.text}</div>`).join('')}</div>` : ''}
      </div>
    </div>
  `;
  div.addEventListener("click", () => {
    state[i] = !state[i];
    div.classList.toggle("checked", state[i]);
    updateProgress();
  });
  list.appendChild(div);
});

updateProgress();
</script>
</body>
</html>
